              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudflareGatewayParametersSpec defines the desired configuration.
            properties:
              dns:
                description: |-
                  DNS configures DNS CNAME record management. When absent, DNS
                  management is enabled for all hostnames in attached HTTPRoutes
                  (each hostname's zone is resolved dynamically via the Cloudflare
                  API). Set dns.zones to restrict management to specific zones, or
                  set dns.zones to an empty list to disable DNS management entirely.
                properties:
                  zones:
                    description: |-
                      Zones restricts DNS CNAME management to hostnames matching these
                      zones. When empty, DNS management is disabled. When this field is
                      absent (i.e. the entire dns object is omitted), DNS management is
                      enabled for all hostnames.
                    items:
                      description: DNSZoneConfig identifies a Cloudflare DNS zone.
                      properties:
                        name:
                          description: Name is the DNS zone name (e.g. "example.com").
                          maxLength: 253
                          type: string
                      required:
                      - name
                      type: object
                    maxItems: 128
                    type: array
                required:
                - zones
                type: object
              secretRef:
                description: |-
                  SecretRef references a Secret in the same namespace containing
                  CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
              tunnel:
                description: Tunnel configures Cloudflare tunnel settings.
                properties:
                  autoscaling:
                    description: Autoscaling configures vertical autoscaling for the
                      tunnel container.
                    properties:
                      controlledResources:
                        description: |-
                          ControlledResources specifies which resource types are subject to
                          autoscaling. Allowed values are "cpu" and "memory". The default
                          is both cpu and memory.
                        items:
                          description: ResourceName is the name identifying various
                            resources in a ResourceList.
                          type: string
                        type: array
                      controlledValues:
                        description: |-
                          ControlledValues specifies which resource values are subject to
                          autoscaling. Allowed values are "RequestsAndLimits" and
                          "RequestsOnly". The default is "RequestsAndLimits".
                        enum:
                        - RequestsAndLimits
                        - RequestsOnly
                        type: string
                      enabled:
                        description: |-
                          Enabled controls whether VPA recommendations are produced and
                          applied for this container. Defaults to false.
                        type: boolean
                      maxAllowed:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          MaxAllowed specifies the maximum amount of resources that will be
                          recommended for the container. The default is no maximum.
                        type: object
                      minAllowed:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          MinAllowed specifies the minimum amount of resources that will be
                          recommended for the container. The default is no minimum.
                        type: object
                    required:
                    - enabled
                    type: object
                  minReadySeconds:
                    description: |-
                      MinReadySeconds is the minimum number of seconds a newly created tunnel
                      pod must be Ready before the Deployment controller considers it Available
                      and terminates the old pod during a rolling update.

                      Defaults to 600 (10 minutes) when absent. This matches the Cloudflare
                      recommendation for rotating tunnel tokens without service disruption:
                      https://developers.cloudflare.com/cloudflare-one/networks/connectors/cloudflare-tunnel/configure-tunnels/remote-tunnel-permissions/#rotate-a-token-without-service-disruption

                      The controller sets progressDeadlineSeconds to minReadySeconds + 60,
                      so Kubernetes will report ProgressDeadlineExceeded if the new pod
                      does not become Ready within that window.

                      In practice, lower values work well. The project's own e2e test
                      performs a rolling update across 3 Deployments with minReadySeconds=30
                      and zero traffic disruption.
                    format: int32
                    minimum: 0
                    type: integer
                  patches:
                    description: |-
                      Patches are RFC 6902 JSON Patch operations applied to the
                      tunnel Deployment. Patches run after the controller builds the
                      base Deployment but before replica placement fields (affinity,
                      zone, nodeSelector) are applied on top. Replica placement always
                      takes priority over user patches.

                      Patch errors are terminal — the controller stops retrying until the
                      CloudflareGatewayParameters resource is updated.
