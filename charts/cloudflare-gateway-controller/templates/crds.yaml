---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: cloudflaregatewayparameters.cloudflare-gateway-controller.io
spec:
  group: cloudflare-gateway-controller.io
  names:
    kind: CloudflareGatewayParameters
    listKind: CloudflareGatewayParametersList
    plural: cloudflaregatewayparameters
    shortNames:
    - cgp
    singular: cloudflaregatewayparameters
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          CloudflareGatewayParameters provides typed configuration for Gateways
          managed by this controller. It can be referenced via
          infrastructure.parametersRef from a Gateway.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CloudflareGatewayParametersSpec defines the desired configuration.
            properties:
              dns:
                description: |-
                  DNS configures DNS CNAME record management. When absent, DNS
                  management is enabled for all hostnames in attached HTTPRoutes
                  (each hostname's zone is resolved dynamically via the Cloudflare
                  API). Set dns.zones to restrict management to specific zones, or
                  set dns.zones to an empty list to disable DNS management entirely.
                properties:
                  zones:
                    description: |-
                      Zones restricts DNS CNAME management to hostnames matching these
                      zones. When empty, DNS management is disabled. When this field is
                      absent (i.e. the entire dns object is omitted), DNS management is
                      enabled for all hostnames.
                    items:
                      description: DNSZoneConfig identifies a Cloudflare DNS zone.
                      properties:
                        name:
                          description: Name is the DNS zone name (e.g. "example.com").
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                required:
                - zones
                type: object
              secretRef:
                description: |-
                  SecretRef references a Secret in the same namespace containing
                  CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
              tunnel:
                description: Tunnel configures Cloudflare tunnel settings.
                properties:
                  deployment:
                    description: Deployment configures the cloudflared Deployment.
                    properties:
                      patches:
                        description: |-
                          Patches are RFC 6902 JSON Patch operations applied to the
                          cloudflared Deployment after it is built.
                        items:
                          description: JSONPatchOperation represents a single RFC
                            6902 JSON Patch operation.
                          properties:
                            from:
                              description: From is the source path for move and copy
                                operations.
                              type: string
                            op:
                              description: Op is the patch operation.
                              enum:
                              - add
                              - remove
                              - replace
                              - move
                              - copy
                              - test
                              type: string
                            path:
                              description: Path is the JSON Pointer path for the operation.
                              type: string
                            value:
                              description: Value is the value to use for add, replace,
                                and test operations.
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - op
                          - path
                          type: object
                        type: array
                    type: object
                type: object
            type: object
        type: object
    served: true
    storage: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: cloudflaregatewaystatuses.cloudflare-gateway-controller.io
spec:
  group: cloudflare-gateway-controller.io
  names:
    kind: CloudflareGatewayStatus
    listKind: CloudflareGatewayStatusList
    plural: cloudflaregatewaystatuses
    shortNames:
    - cgs
    singular: cloudflaregatewaystatus
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.tunnel.name
      name: Tunnel Name
      type: string
    - jsonPath: .status.tunnel.id
      name: Tunnel ID
      type: string
    - jsonPath: .status.conditions[?(@.type=="DNSManagement")].reason
      name: DNS
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          CloudflareGatewayStatus stores the observable Cloudflare resource state
          for a Gateway managed by this controller. The controller creates one CGS
          per managed Gateway (same name and namespace) and keeps it up to date
          during reconciliation. This state is used for safe cleanup when the
          CloudflareGatewayParameters reference changes or is deleted.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          status:
            description: |-
              CloudflareGatewayStatusDetail holds the full observable state of Cloudflare
              resources managed for a Gateway.
            properties:
              conditions:
                description: |-
                  Conditions report the current state of the Gateway's Cloudflare resources.
                  Condition types mirror the Gateway's own conditions (Accepted, Programmed,
                  Ready) so users can inspect them on the CGS directly.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              inventory:
                description: Inventory lists all Kubernetes objects managed by this
                  Gateway.
                items:
                  description: ResourceRef identifies a Kubernetes object managed
                    by a Gateway.
                  properties:
                    apiVersion:
                      description: APIVersion is the API group and version of the
                        resource (e.g. "v1", "apps/v1").
                      type: string
                    kind:
                      description: Kind is the resource kind (e.g. "Deployment", "Secret").
                      type: string
                    name:
                      description: Name is the resource name (same namespace as the
                        Gateway).
                      type: string
                  required:
                  - apiVersion
                  - kind
                  - name
                  type: object
                type: array
              tunnel:
                description: Tunnel holds the Cloudflare tunnel managed for this Gateway.
                properties:
                  id:
                    description: ID is the Cloudflare tunnel UUID.
                    type: string
                  name:
                    description: Name is the Cloudflare tunnel name.
                    type: string
                required:
                - id
                - name
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
