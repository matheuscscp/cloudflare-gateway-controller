                      description: JSONPatchOperation represents a single RFC 6902
                        JSON Patch operation.
                      properties:
                        from:
                          description: From is the source path for move and copy operations.
                          type: string
                        op:
                          description: Op is the patch operation.
                          enum:
                          - add
                          - remove
                          - replace
                          - move
                          - copy
                          - test
                          type: string
                        path:
                          description: Path is the JSON Pointer path for the operation.
                          type: string
                        value:
                          description: Value is the value to use for add, replace,
                            and test operations.
                          x-kubernetes-preserve-unknown-fields: true
