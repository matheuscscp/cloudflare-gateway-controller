rbac:
  serviceAccountName: "" # When set, skip creating RBAC resources and use the provided service account name.

image:
  repository: ghcr.io/matheuscscp/cloudflare-gateway-controller
  tag: "" # Defaults to .Chart.AppVersion.
  pullPolicy: IfNotPresent

replicas: 1

config:
  clusterName: "" # Required. Unique cluster identifier for deterministic Cloudflare resource naming.

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL

podAnnotations: {}
podArgs: []
podEnv: []
podVolumes: []
podVolumeMounts: []
