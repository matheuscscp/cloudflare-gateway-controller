name: e2e

on:
  schedule:
    - cron: "0 4 * * *" # nightly at 4 AM UTC
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e # lock for shared Cloudflare resources
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/matheuscscp/cloudflare-gateway-controller/test

jobs:
  # Build and push the controller image to GHCR for use by e2e jobs.
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build controller image
        run: make docker-build IMG=${{ env.IMAGE }}:${{ github.sha }}

      - name: Push controller image
        id: push
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          FULL_REF=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ env.IMAGE }}:${{ github.sha }}")
          echo "digest=${FULL_REF##*@}" >> "$GITHUB_OUTPUT"

  # Clean up orphaned Cloudflare resources from previous failed runs.
  # Runs in parallel with docker-build so it doesn't add latency.
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Write credentials
        env:
          CLOUDFLARE_CREDENTIALS: ${{ secrets.CLOUDFLARE_CREDENTIALS }}
        run: |
          cat <<EOF > api.token
          ${CLOUDFLARE_CREDENTIALS}
          EOF

      - name: Cleanup Cloudflare resources
        run: hack/cleanup-cloudflare.sh

      - name: Cleanup credentials
        if: always()
        run: rm -f api.token

  # Run e2e tests.
  e2e:
    needs: [docker-build, cleanup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Pull controller image by digest
        run: docker pull ${{ env.IMAGE }}@${{ needs.docker-build.outputs.digest }}

      - name: Tag image for kind
        run: docker tag ${{ env.IMAGE }}@${{ needs.docker-build.outputs.digest }} controller:e2e

      - name: Write credentials
        env:
          CLOUDFLARE_CREDENTIALS: ${{ secrets.CLOUDFLARE_CREDENTIALS }}
        run: |
          cat <<EOF > api.token
          ${CLOUDFLARE_CREDENTIALS}
          EOF

      - name: Run e2e tests
        env:
          IMAGE: controller:e2e
          TEST_ZONE_NAME: ci.cloudflare-gateway-controller.dev
        run: make test-e2e

      - name: Print controller logs
        if: always()
        run: for f in *-controller.log; do [ -f "$f" ] && echo "=== $f ===" && cat "$f"; done

      - name: Cleanup credentials
        if: always()
        run: rm -f api.token

  # Clean up Cloudflare resources created during e2e tests.
  # Runs even if e2e jobs fail to avoid leaving orphaned resources.
  post-cleanup:
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

      - name: Write credentials
        env:
          CLOUDFLARE_CREDENTIALS: ${{ secrets.CLOUDFLARE_CREDENTIALS }}
        run: |
          cat <<EOF > api.token
          ${CLOUDFLARE_CREDENTIALS}
          EOF

      - name: Cleanup Cloudflare resources
        run: hack/cleanup-cloudflare.sh

      - name: Cleanup credentials
        if: always()
        run: rm -f api.token
