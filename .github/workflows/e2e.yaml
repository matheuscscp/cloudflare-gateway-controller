name: e2e

on:
  schedule:
    - cron: "0 4 * * *" # nightly at 4 AM UTC
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e # lock for shared Cloudflare resources
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/matheuscscp/cloudflare-gateway-controller/test

jobs:
  # Build and push the controller image, then clean up orphaned Cloudflare
  # resources from previous failed runs. On fork PRs, only the build runs
  # (no push, no cleanup) to validate compilation.
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push controller image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract cfgwctl from controller image
        if: steps.push.outputs.digest != ''
        run: |
          mkdir -p ./bin
          docker pull ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          container=$(docker create ${{ env.IMAGE }}@${{ steps.push.outputs.digest }})
          docker cp "$container":/cfgwctl ./bin/cfgwctl
          docker rm "$container"

      - name: Write credentials
        if: steps.push.outputs.digest != ''
        env:
          CLOUDFLARE_CREDENTIALS: ${{ secrets.CLOUDFLARE_CREDENTIALS }}
        run: |
          cat <<EOF > api.token
          ${CLOUDFLARE_CREDENTIALS}
          EOF

      - name: Cleanup Cloudflare resources
        if: steps.push.outputs.digest != ''
        run: hack/cleanup-cloudflare.sh

      - name: Cleanup credentials
        if: always()
        run: rm -f api.token

  # Run e2e tests in parallel (one job per test).
  e2e-matrix:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: [docker-build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - test_gateway_lifecycle
          - test_multi_routes
          - test_dns_default_all_zones
          - test_no_dns
          - test_disabled_reconciliation
          - test_dns_config_removal
          - test_multi_zone_dns
          - test_multi_gateway_overlapping_zones
          - test_cluster_recreation
          - test_load_balancing
          - test_traffic_splitting
          - test_session_persistence
          - test_vpa_autoscaling
          - test_suspend_gateway
          - test_resume_gateway
          - test_reconcile_gateway
          - test_rotate_gateway_token
          - test_podinfo
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull controller image by digest
        run: docker pull ${{ env.IMAGE }}@${{ needs.docker-build.outputs.digest }}

      - name: Tag image for kind
        run: docker tag ${{ env.IMAGE }}@${{ needs.docker-build.outputs.digest }} controller:e2e

      - name: Extract cfgwctl from controller image
        run: |
          mkdir -p ./bin
          container=$(docker create controller:e2e)
          docker cp "$container":/cfgwctl ./bin/cfgwctl
          docker rm "$container"

      - name: Install podcli
        if: matrix.test == 'test_podinfo'
        run: GOBIN=$(pwd)/bin go install github.com/stefanprodan/podinfo/cmd/podcli@master

      - name: Write credentials
        env:
          CLOUDFLARE_CREDENTIALS: ${{ secrets.CLOUDFLARE_CREDENTIALS }}
        run: |
          cat <<EOF > api.token
          ${CLOUDFLARE_CREDENTIALS}
          EOF

      - name: Run e2e test
        env:
          IMAGE: controller:e2e
          TEST_ZONE_NAME: ci.cloudflare-gateway-controller.dev
          TEST_ZONE_NAME_2: z2.ci.cloudflare-gateway-controller.dev
          TEST_ZONE_NAME_3: z3.cloudflare-gateway-controller.dev
          TEST_TRAFFIC_ZONE_NAME: cloudflare-gateway-controller.dev
          TEST: ${{ matrix.test }}
        run: |
          set -o pipefail
          KIND_CLUSTER_NAME="${TEST//_/-}" hack/e2e-test.sh 2>&1 | stdbuf -oL tee test-e2e.log

      - name: Print controller logs
        if: always()
        run: for f in *-controller.log; do [ -f "$f" ] && echo "=== $f ===" && cat "$f"; done

      - name: Cleanup credentials
        if: always()
        run: rm -f api.token

  # Gate job for branch protection rules. Always runs, but fails if any
  # matrix job did not succeed.
  e2e:
    if: always()
    needs: [e2e-matrix]
    runs-on: ubuntu-latest
    steps:
      - run: |
          result="${{ needs.e2e-matrix.result }}"
          [ "$result" = "success" ] || [ "$result" = "skipped" ] || exit 1

  # Clean up Cloudflare resources created during e2e tests.
  # Runs even if e2e jobs fail to avoid leaving orphaned resources.
  post-cleanup:
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    needs: [docker-build, e2e-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract cfgwctl from controller image
        run: |
          mkdir -p ./bin
          docker pull ${{ env.IMAGE }}@${{ needs.docker-build.outputs.digest }}
          container=$(docker create ${{ env.IMAGE }}@${{ needs.docker-build.outputs.digest }})
          docker cp "$container":/cfgwctl ./bin/cfgwctl
          docker rm "$container"

      - name: Write credentials
        env:
          CLOUDFLARE_CREDENTIALS: ${{ secrets.CLOUDFLARE_CREDENTIALS }}
        run: |
          cat <<EOF > api.token
          ${CLOUDFLARE_CREDENTIALS}
          EOF

      - name: Cleanup Cloudflare resources
        run: hack/cleanup-cloudflare.sh

      - name: Cleanup credentials
        if: always()
        run: rm -f api.token
