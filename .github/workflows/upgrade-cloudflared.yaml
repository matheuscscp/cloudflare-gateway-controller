name: upgrade-cloudflared

on:
  schedule:
    - cron: "0 8 * * 2" # every Tuesday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: false

      - name: Get latest fork release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release view --repo matheuscscp/cloudflared --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Get fork commit for release
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          commit_info=$(gh api repos/matheuscscp/cloudflared/commits/$TAG)
          sha=$(echo "$commit_info" | jq -r '.sha')
          date=$(echo "$commit_info" | jq -r '.commit.committer.date')
          timestamp=$(date -u -d "$date" +%Y%m%d%H%M%S)
          short=${sha:0:12}
          pseudo="v0.0.0-${timestamp}-${short}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "pseudo=$pseudo" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Update go.mod
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PSEUDO: ${{ steps.commit.outputs.pseudo }}
          TAG: ${{ steps.release.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const { PSEUDO, TAG } = process.env;
            let gomod = fs.readFileSync('go.mod', 'utf8');

            // Update cloudflared fork pin.
            gomod = gomod.replace(
              /github\.com\/matheuscscp\/cloudflared v\S+/,
              `github.com/matheuscscp/cloudflared ${PSEUDO}`
            );

            // Update urfave/cli fork pin to match upstream cloudflared,
            // unless we pinned a newer version for a CVE fix.
            const resp = await fetch(
              `https://raw.githubusercontent.com/cloudflare/cloudflared/${TAG}/go.mod`
            );
            const upstreamMod = await resp.text();
            const upstreamCli = upstreamMod.match(/github\.com\/ipostelnik\/cli\/v2 (\S+)/)[1];
            const ourCli = gomod.match(/github\.com\/ipostelnik\/cli\/v2 (\S+)/)[1];
            const cveFix = /\/\/ CVE fix: true/.test(gomod);

            // Compare Go module versions. Handles both semver (v2.4.0) and
            // pseudo-versions (v2.3.1-0.20210324024421-b6ea8234fe3d).
            function compareBase(a, b) {
              const pa = a.replace(/^v/, '').split('.').map(Number);
              const pb = b.replace(/^v/, '').split('.').map(Number);
              for (let i = 0; i < 3; i++) {
                if (pa[i] !== pb[i]) return pa[i] - pb[i];
              }
              return 0;
            }
            function isAhead(a, b) {
              const ma = a.match(/^(v\d+\.\d+\.\d+)(?:-(.+))?$/);
              const mb = b.match(/^(v\d+\.\d+\.\d+)(?:-(.+))?$/);
              const cmp = compareBase(ma[1], mb[1]);
              if (cmp !== 0) return cmp > 0;
              const pa = ma[2] || '', pb = mb[2] || '';
              if (!pa && pb) return true;   // release > pre-release
              if (pa && !pb) return false;
              return pa > pb;               // lexicographic works for fixed-width timestamps
            }

            if (!cveFix || isAhead(upstreamCli, ourCli)) {
              gomod = gomod.replace(
                `github.com/ipostelnik/cli/v2 ${ourCli}`,
                `github.com/ipostelnik/cli/v2 ${upstreamCli}`
              );
              if (cveFix) {
                gomod = gomod.replace('// CVE fix: true', '// CVE fix: false');
              }
            }

            fs.writeFileSync('go.mod', gomod);

      - name: Run go mod tidy
        run: go mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: Upgrade cloudflared to ${{ steps.release.outputs.tag }}
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: upgrade-cloudflared
          title: Upgrade cloudflared to ${{ steps.release.outputs.tag }}
          body: |
            Automated cloudflared upgrade to `${{ steps.release.outputs.tag }}`.

            Fork commit: `${{ steps.commit.outputs.sha }}`

            Generated by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
