name: upgrade-cloudflared

on:
  schedule:
    - cron: "0 8 * * 2" # every Tuesday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: false

      - name: Get latest fork release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release view --repo matheuscscp/cloudflared --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Get fork commit for release
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          commit_info=$(gh api repos/matheuscscp/cloudflared/commits/$TAG)
          sha=$(echo "$commit_info" | jq -r '.sha')
          date=$(echo "$commit_info" | jq -r '.commit.committer.date')
          timestamp=$(date -u -d "$date" +%Y%m%d%H%M%S)
          short=${sha:0:12}
          pseudo="v0.0.0-${timestamp}-${short}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "pseudo=$pseudo" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Update go.mod
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PSEUDO: ${{ steps.commit.outputs.pseudo }}
          TAG: ${{ steps.release.outputs.tag }}
        with:
          script: |
            const fs = require('fs');
            const { PSEUDO, TAG } = process.env;
            let gomod = fs.readFileSync('go.mod', 'utf8');

            // Update cloudflared fork pin.
            gomod = gomod.replace(
              /github\.com\/matheuscscp\/cloudflared v\S+/,
              `github.com/matheuscscp/cloudflared ${PSEUDO}`
            );

            // Fetch fork's go.mod and extract all replace directives.
            const resp = await fetch(
              `https://raw.githubusercontent.com/matheuscscp/cloudflared/${TAG}/go.mod`
            );
            const forkMod = await resp.text();
            const replaces = forkMod.match(/^replace .+$/gm) || [];

            // Replace the marker block with the fork's replace directives.
            const body = replaces.length ? `\n\n${replaces.join('\n\n')}\n\n` : '\n';
            gomod = gomod.replace(
              /\/\/ cloudflared:replace:begin\n[\s\S]*?\/\/ cloudflared:replace:end/,
              `// cloudflared:replace:begin${body}// cloudflared:replace:end`
            );

            fs.writeFileSync('go.mod', gomod);

      - name: Run go mod tidy
        run: go mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: Upgrade cloudflared to ${{ steps.release.outputs.tag }}
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: upgrade-cloudflared
          title: Upgrade cloudflared to ${{ steps.release.outputs.tag }}
          body: |
            Automated cloudflared upgrade to `${{ steps.release.outputs.tag }}`.

            Fork commit: `${{ steps.commit.outputs.sha }}`

            Generated by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
