name: upgrade-cloudflared

on:
  schedule:
    - cron: "0 8 * * 2" # every Tuesday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: false

      - name: Get latest fork release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release view --repo matheuscscp/cloudflared --json tagName -q .tagName)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Get fork commit for release
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          commit_info=$(gh api repos/matheuscscp/cloudflared/commits/$TAG)
          sha=$(echo "$commit_info" | jq -r '.sha')
          date=$(echo "$commit_info" | jq -r '.commit.committer.date')
          timestamp=$(date -u -d "$date" +%Y%m%d%H%M%S)
          short=${sha:0:12}
          pseudo="v0.0.0-${timestamp}-${short}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "pseudo=$pseudo" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        env:
          PSEUDO: ${{ steps.commit.outputs.pseudo }}
        run: |
          current=$(grep 'matheuscscp/cloudflared' go.mod | grep -oP 'v0\.0\.0-\S+' || echo "")
          if [ "$current" = "$PSEUDO" ]; then
            echo "Already up to date"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update needed: $current -> $PSEUDO"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: steps.check.outputs.needed == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update go.mod
        if: steps.check.outputs.needed == 'true'
        env:
          PSEUDO: ${{ steps.commit.outputs.pseudo }}
        run: |
          sed -i "s|github.com/matheuscscp/cloudflared v[^ ]*|github.com/matheuscscp/cloudflared $PSEUDO|" go.mod
          GONOSUMCHECK=github.com/matheuscscp/cloudflared go mod tidy

      - name: Create Pull Request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: Upgrade cloudflared to ${{ steps.release.outputs.tag }}
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: upgrade-cloudflared
          title: Upgrade cloudflared to ${{ steps.release.outputs.tag }}
          body: |
            Automated cloudflared upgrade to `${{ steps.release.outputs.tag }}`.

            Fork commit: `${{ steps.commit.outputs.sha }}`

            Generated by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
