name: upgrade-gateway-api

on:
  schedule:
    - cron: "0 8 * * 1" # every Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: false

      - name: Get latest Gateway API release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh api repos/kubernetes-sigs/gateway-api/releases/latest --jq '.tag_name')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Upgrade Go module
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          go get "sigs.k8s.io/gateway-api@$TAG"
          go mod tidy

      - name: Update test Gateway API version
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          version="${TAG#v}"
          sed -i "s/semver.MustParse(\"[^\"]*\")/semver.MustParse(\"${version}\")/" \
            internal/controller/suite_test.go

      - name: Download and split Gateway API YAMLs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.release.outputs.tag }}';
            const url = `https://github.com/kubernetes-sigs/gateway-api/releases/download/${tag}/experimental-install.yaml`;
            const resp = await fetch(url);
            const text = await resp.text();

            const copyright = '# Copyright 2026 Matheus Pimenta.\n# SPDX-License-Identifier: AGPL-3.0\n\n';
            const chart = 'charts/cloudflare-gateway-controller';

            // Split on "---" boundaries into individual YAML documents.
            const docs = text.split(/^---$/m).filter(d => d.trim());

            const crds = [];
            const other = [];
            for (const doc of docs) {
              if (/^kind:\s*CustomResourceDefinition$/m.test(doc)) {
                crds.push(doc.trim());
              } else if (/^kind:/m.test(doc)) {
                other.push(doc.trim());
              }
            }

            fs.writeFileSync(`${chart}/crds/gateway-api.yaml`, copyright + crds.join('\n---\n') + '\n');
            fs.writeFileSync(`${chart}/templates/gateway-api.yaml`,
              copyright + '{{- if .Values.api.enabled }}\n' + other.join('\n---\n') + '\n{{- end }}\n');

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: Upgrade Gateway API to ${{ steps.release.outputs.tag }}
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: upgrade-api
          title: Upgrade Gateway API to ${{ steps.release.outputs.tag }}
          body: |
            Automated Gateway API upgrade to `${{ steps.release.outputs.tag }}`.

            Release: https://github.com/kubernetes-sigs/gateway-api/releases/tag/${{ steps.release.outputs.tag }}

            Generated by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
