name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'image tag prefix'
        default: 'rc'
        required: true

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  CHART: ghcr.io/${{ github.repository_owner }}/charts/cloudflare-gateway-controller

jobs:
  release:
    outputs:
      image_url: ${{ steps.slsa.outputs.image_url }}
      image_digest: ${{ steps.slsa.outputs.image_digest }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # for creating the GitHub release.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for pushing and signing container images.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Prepare
        id: prep
        run: |
          VERSION="${{ github.event.inputs.tag }}-${GITHUB_SHA::8}"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF/refs\/tags\//}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "SEMVER=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.VERSION }}

      - name: Publish image
        id: build-push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          sbom: true
          provenance: true
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        run: |
          cosign sign --yes ${{ env.IMAGE }}@${{ steps.build-push.outputs.digest }}

      - name: Verify signature
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity="https://github.com/${REPOSITORY}/.github/workflows/release.yaml@${GITHUB_REF}" \
            ${{ env.IMAGE }}@${{ steps.build-push.outputs.digest }}

      - name: Set chart version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SEMVER: ${{ steps.prep.outputs.SEMVER }}
        run: |
          sed -i "s/^version: .*/version: ${SEMVER}/" charts/cloudflare-gateway-controller/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"v${SEMVER}\"/" charts/cloudflare-gateway-controller/Chart.yaml

      - name: Lint Helm chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: helm lint charts/cloudflare-gateway-controller

      - name: Package Helm chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: helm package charts/cloudflare-gateway-controller

      - name: Push Helm chart
        if: startsWith(github.ref, 'refs/tags/v')
        id: helm-push
        run: |
          helm push cloudflare-gateway-controller-${{ steps.prep.outputs.SEMVER }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts 2>&1 | tee helm-push.log
          digest=$(grep Digest: helm-push.log | awk '{print $NF}')
          echo "digest=$digest" >> $GITHUB_OUTPUT

      - name: Sign Helm chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign --yes ${{ env.CHART }}@${{ steps.helm-push.outputs.digest }}

      - name: Verify Helm chart signature
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity="https://github.com/${REPOSITORY}/.github/workflows/release.yaml@${GITHUB_REF}" \
            ${{ env.CHART }}@${{ steps.helm-push.outputs.digest }}

      - name: Reset git state for GoReleaser
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git checkout -- charts/cloudflare-gateway-controller/Chart.yaml
          rm -f cloudflare-gateway-controller-*.tgz

      - name: Set up Syft
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Set up Go
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        if: startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SLSA metadata
        id: slsa
        run: |
          image_url=${{ env.IMAGE }}:${{ steps.prep.outputs.VERSION }}
          echo "image_url=$image_url" >> $GITHUB_OUTPUT
          image_digest=${{ steps.build-push.outputs.digest }}
          echo "image_digest=$image_digest" >> $GITHUB_OUTPUT

  ghcr-provenance:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read # for detecting the Github Actions environment.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for uploading attestations.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.release.outputs.image_url }}
      digest: ${{ needs.release.outputs.image_digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
