#
# Kind cluster config with 2 labeled worker nodes for multi-AZ e2e tests.
# Worker nodes are labeled with topology.kubernetes.io/zone matching the
# AvailabilityZone.zone field used in CloudflareGatewayParameters.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
- role: worker
  labels:
    topology.kubernetes.io/zone: az-a
- role: worker
  labels:
    topology.kubernetes.io/zone: az-b
